name: aggregation

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregation:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: ./data/requirements.txt
      - run: pip install -r ./data/requirements.txt
      - run: python ./data/aggregation.py
      - name: Generate metadata
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +'%Y.%m.%d-%H%M')
          echo "{\"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\", \"version\": \"$TIMESTAMP ($SHORT_SHA)\"}" > data/data/metadata.json
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'cron data update'
          branch: 'master'
          file_pattern: 'data/data/*.json'
      - name: Upload Aggregated Data
        uses: actions/upload-artifact@v4
        with:
          name: aggregated-data
          path: data/data/
          retention-days: 1