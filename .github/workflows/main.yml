name: Data & Deploy

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    name: Run Tests
    # Only run tests on push to master, skip on cron or manual dispatch if desired,
    # but usually it's safer to run them on push.
    if: github.event_name == 'push'
    uses: ./.github/workflows/test.yml

  data-and-deploy:
    name: Data Aggregation & Deployment
    needs: [test]
    # Ensure this runs even if 'test' was skipped (e.g. on cron)
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: ./data/requirements.txt

      - name: Install Python dependencies
        run: pip install -r ./data/requirements.txt

      - name: Fetch data
        run: python ./data/aggregation.py

      - name: Generate metadata
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +'%Y.%m.%d-%H%M')
          echo "{\"timestamp\": \"$(date -u +'%Y-%m-%dT%H:%M:%SZ')\", \"version\": \"$TIMESTAMP ($SHORT_SHA)\"}" > data/data/metadata.json

      - name: Commit data changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'cron data update [skip ci]'
          file_pattern: 'data/data/*.json'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
