name: deployment

on:
  workflow_call:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Aggregated Data
        uses: actions/download-artifact@v4
        with:
          name: aggregated-data
          path: .
        continue-on-error: true

      - name: Debug data directory
        run: |
          ls -R data/data/
          cat data/data/metadata.json || echo "metadata.json not found"

      - name: Setup node env
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
      
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          cname: rhygfuehl.ch